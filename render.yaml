services:
  # FastAPI Backend Service
  - type: web
    name: sms-backend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: sms-postgres
          property: connectionString
      - key: ENVIRONMENT
        value: production
      - key: SECRET_KEY
        generateValue: true
      - key: ALGORITHM
        value: HS256
      - key: BACKEND_CORS_ORIGINS
        value: '["https://sms-frontend.onrender.com"]' # Replace with actual frontend URL once deployed

  # React Frontend Service
  - type: web
    name: sms-frontend
    env: static
    buildCommand: npm run build
    publishPath: dist
    headers:
      - key: Cache-Control
        value: public, max-age=31536000
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

databases:
  - name: sms-postgres
    databaseName: sms_db
    user: sms_user
    plan: free
